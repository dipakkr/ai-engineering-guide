<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineering Guide</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" id="code-theme"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>

  <header id="header">
    <div class="header-left">
      <span class="logo">📚</span>
      <span class="logo-text">AI Engineering Guide</span>
    </div>
    <div class="header-right">
      <a id="github-star" href="https://github.com/dipakkr/ai-engineering-guide"
         target="_blank" rel="noopener" class="header-btn" title="View on GitHub">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
            2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
            0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21
            2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04
            2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
            2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        View on GitHub
        <span id="star-count"></span>
      </a>
      <button id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="layout">

    <aside id="sidebar">
      <div id="progress-bar">
        <span>Progress</span>
        <span id="progress-count">0 / 63 lessons</span>
      </div>
      <nav id="course-nav"></nav>
    </aside>

    <main id="main">
      <div id="content-wrapper">
        <div id="content-header">
          <h1 id="lesson-title">Welcome</h1>
          <div id="lesson-meta">
            <span id="read-time">⏱ — min read</span>
          </div>
        </div>
        <div id="content"></div>
        <div id="nav-buttons">
          <button id="prev-btn" class="nav-btn" disabled>← Previous</button>
          <button id="complete-btn" class="nav-btn complete-btn">✓ Mark Complete</button>
          <button id="next-btn" class="nav-btn next-btn" disabled>Next →</button>
        </div>
      </div>
    </main>

    <aside id="toc-sidebar">
      <div class="toc-header">≡ ON THIS PAGE</div>
      <nav id="toc"></nav>
    </aside>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
